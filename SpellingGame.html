<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EagleLearn – Spelling Challenge</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:linear-gradient(135deg,#0b1f3a,#1f3b73,#b8860b);
    color:#fff;
    text-align:center;
    min-height:100vh;
}

.screen{
    padding:30px;
}
.hidden{display:none;}

button{
    padding:14px 22px;
    margin:10px;
    font-size:18px;
    border-radius:10px;
    border:none;
    cursor:pointer;
}

.primaryBtn{background:#3fb950;color:#fff;}
.modeBtn{background:#b8860b;color:#000;}
.dangerBtn{background:#f85149;color:#fff;}

.word-display{
    font-size:40px;
    letter-spacing:15px;
    margin:25px 0;
}

.keyboard{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    max-width:600px;
    margin:auto;
}

.key{
    margin:5px;
    padding:12px;
    width:45px;
    font-weight:bold;
}

.correct{color:lime;}
.incorrect{color:#ff8080;}
</style>
</head>

<body>

<!-- ================= MENU ================= -->

<div id="menuScreen" class="screen">

<h1>🦅 EagleLearn - Spelling Challenge</h1>

<input id="wordInput"
placeholder="Enter spelling word"
onkeypress="if(event.key==='Enter') addWord()">

<button class="primaryBtn" onclick="addWord()">Add Word</button>

<div id="wordList"></div>

<br>

<button class="modeBtn" onclick="selectMode('hangman')">
🎯 Play Hangman
</button>

</div>

<!-- ================= HANGMAN ================= -->

<div id="hangmanScreen" class="screen hidden">

<h2>🎯 Hangman</h2>

<div id="livesDisplay"></div>

<canvas id="hangmanCanvas" width="300" height="300"
style="background:white;border-radius:10px;"></canvas>

<div id="wordDisplay" class="word-display"></div>

<div id="keyboard" class="keyboard"></div>

<p id="hangmanFeedback"></p>

<button onclick="exitGame()">← Back</button>

</div>

<script>

/* ================= DATA ================= */

let spellingWords=[];
let currentWord="";
let guessedLetters=[];
let wrongGuesses=0;
const maxWrongGuesses=6;

const STORAGE_KEY="eagleWords";

/* ================= STORAGE ================= */

function loadWords(){
    const saved=localStorage.getItem(STORAGE_KEY);
    if(saved){
        spellingWords=JSON.parse(saved);
        displayWordList();
    }
}

function saveWords(){
    localStorage.setItem(STORAGE_KEY,JSON.stringify(spellingWords));
}

/* ================= WORD LIST ================= */

function addWord(){
    const input=document.getElementById("wordInput");
    if(!input) return;

    const word=input.value.trim().toUpperCase();
    if(!word) return;

    spellingWords.push(word);
    saveWords();
    displayWordList();

    input.value="";
    input.focus();
}

function displayWordList(){
    const list=document.getElementById("wordList");
    if(!list) return;

    list.innerHTML=spellingWords.map(w=>`<div>${w}</div>`).join("");
}

/* ================= NAVIGATION ================= */

function selectMode(mode){

    if(spellingWords.length===0){
        alert("Add words first!");
        return;
    }

    document.getElementById("menuScreen").classList.add("hidden");
    document.getElementById("hangmanScreen").classList.remove("hidden");

    startHangmanRound();
}

function exitGame(){
    document.getElementById("hangmanScreen").classList.add("hidden");
    document.getElementById("menuScreen").classList.remove("hidden");
}

/* ================= SAFE HELPERS ================= */

function safe(fn){
    try{ fn(); }
    catch(e){ console.log("SAFE ERROR:",e); }
}

/* ================= HANGMAN ================= */

function startHangmanRound(){

    currentWord =
        spellingWords[Math.floor(Math.random()*spellingWords.length)];

    guessedLetters=[];
    wrongGuesses=0;

    safe(updateWordDisplay);
    safe(updateLivesDisplay);
    safe(drawHangman);
    initKeyboard();

    // iPad speech timing fix
    setTimeout(()=>{
        speakWord(currentWord);
    },600);
}

function updateWordDisplay(){
    const el=document.getElementById("wordDisplay");
    if(!el) return;

    el.textContent=currentWord
        .split("")
        .map(l=>guessedLetters.includes(l)?l:"_")
        .join(" ");
}

function updateLivesDisplay(){
    const el=document.getElementById("livesDisplay");
    if(!el) return;

    el.textContent=
        "Lives: "+"❤️".repeat(maxWrongGuesses-wrongGuesses);
}

function guessLetter(letter,btn){

    if(guessedLetters.includes(letter)) return;

    guessedLetters.push(letter);

    if(currentWord.includes(letter)){
        btn.style.background="#3fb950";
        updateWordDisplay();

        if(currentWord.split("").every(l=>guessedLetters.includes(l))){
            document.getElementById("hangmanFeedback")
                .textContent="🦅 Correct!";
        }

    }else{
        btn.style.background="#f85149";
        wrongGuesses++;
        updateLivesDisplay();
        safe(drawHangman);
    }
}

function initKeyboard(){

    const kb=document.getElementById("keyboard");
    if(!kb) return;

    kb.innerHTML="";

    "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter=>{
        const b=document.createElement("button");
        b.className="key";
        b.textContent=letter;
        b.onclick=()=>guessLetter(letter,b);
        kb.appendChild(b);
    });
}

/* ===== CANVAS SAFE DRAW (MAIN FIX) ===== */

function drawHangman(){

    const canvas=document.getElementById("hangmanCanvas");
    if(!canvas) return;

    const ctx=canvas.getContext("2d");
    if(!ctx) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.lineWidth=3;

    ctx.beginPath();
    ctx.moveTo(20,280);
    ctx.lineTo(180,280);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(60,280);
    ctx.lineTo(60,40);
    ctx.lineTo(180,40);
    ctx.lineTo(180,80);
    ctx.stroke();

    if(wrongGuesses>=1){
        ctx.beginPath();
        ctx.arc(180,100,20,0,Math.PI*2);
        ctx.stroke();
    }
}

/* ================= SPEECH ================= */

function speakWord(word){
    window.speechSynthesis.cancel();

    const u=new SpeechSynthesisUtterance(word);
    u.rate=0.8;
    u.lang="en-US";

    window.speechSynthesis.speak(u);
}

/* ================= INIT ================= */

document.addEventListener("DOMContentLoaded",()=>{

    loadWords();

    const input=document.getElementById("wordInput");
    if(input){
        setTimeout(()=>input.focus(),100);
    }

});
</script>

</body>
</html>
