<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EagleLearn – Spelling Challenge</title>

<style>
/* ===== SAME STYLES (UNCHANGED) ===== */
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:linear-gradient(135deg,#0b1f3a,#1f3b73,#b8860b);
    color:#fff;
    text-align:center;
    overflow-x:hidden;
    min-height:100vh;
}

.screen{ 
    padding:30px; 
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}
.hidden{ display:none !important; }

button{
    padding:15px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
    -webkit-tap-highlight-color: transparent;
}

button:active{ transform:scale(0.95); }

.modeBtn{ background:#b8860b;color:#000;font-weight:bold; }
.primaryBtn{ background:#3fb950;color:#fff;font-weight:bold; }
.dangerBtn{ background:#f85149;color:#fff; }

.correct{ color:lime; }
.incorrect{ color:#ff8080; }

/* (All your remaining CSS stays identical — removed here only
   to keep this response readable. KEEP your existing CSS.) */
</style>
</head>

<body>

<!-- ================= MENU SCREEN ================= -->

<div class="screen" id="menuScreen">

<h1>🦅 EagleLearn - Spelling Challenge</h1>

<div class="spelling-manager">
<h2>📝 My Spelling Words</h2>

<div class="word-input-area">
<input type="text" id="wordInput"
placeholder="Enter a spelling word"
onkeypress="if(event.key==='Enter') addWord()">
<button class="primaryBtn" onclick="addWord()">+ Add Word</button>
</div>

<div class="word-list" id="wordList">
<p style="color:#ccc;">No words yet. Add your weekly spelling list!</p>
</div>

<div>
<button class="dangerBtn" onclick="clearAllWords()">Clear All Words</button>
<button class="modeBtn" onclick="loadSampleWords()">Load Sample Words</button>
</div>
</div>

<div class="mode-selector">
<div class="mode-card" onclick="selectMode('scramble')">
<h3>🔀 Word Scramble</h3>
</div>

<div class="mode-card" onclick="selectMode('hangman')">
<h3>🎯 Hangman</h3>
</div>

<div class="mode-card" onclick="selectMode('fillblank')">
<h3>📝 Fill in the Blank</h3>
</div>
</div>

<button onclick="backToMenu()">← Back to EagleLearn</button>

</div>

<!-- ================= SCRAMBLE SCREEN ================= -->

<div class="screen hidden" id="scrambleScreen">
<h2>🔀 Word Scramble</h2>

<div id="scrambledDisplay"></div>

<input id="scrambleAnswer"
placeholder="Type your answer"
onkeypress="if(event.key==='Enter') checkScramble()">

<div>
<button onclick="checkScramble()">✓ Check Answer</button>
<button onclick="skipWord()">Skip</button>
</div>

<p id="scrambleFeedback"></p>

<button onclick="exitGame()">← Back to Menu</button>
</div>

<!-- ================= HANGMAN SCREEN ================= -->

<div class="screen hidden" id="hangmanScreen">
<h2>🎯 Hangman</h2>

<div id="livesDisplay"></div>
<canvas id="hangmanCanvas" width="300" height="300"></canvas>
<div id="wordDisplay"></div>
<div id="keyboard"></div>

<p id="hangmanFeedback"></p>

<button onclick="exitGame()">← Back to Menu</button>
</div>

<!-- ================= FILL BLANK SCREEN ================= -->

<div class="screen hidden" id="fillBlankScreen">
<h2>📝 Fill in the Blank</h2>

<div id="sentenceDisplay"></div>
<div id="choiceBubbles"></div>

<p id="fillBlankFeedback"></p>

<button onclick="exitGame()">← Back to Menu</button>
</div>

<script>
/* ================= DATA ================= */

let spellingWords = [];
let currentMode = '';
let currentWordIndex = 0;
let currentWord = '';

const STORAGE_KEY = 'eagleSpellingWords';

/* ================= WORD MANAGEMENT ================= */

function loadWords(){
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved){
        spellingWords = JSON.parse(saved);
        displayWordList();
    }
}

function saveWords(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(spellingWords));
}

function addWord(){
    const input = document.getElementById('wordInput');
    if(!input) return;

    const word = input.value.trim().toUpperCase();
    if(!word) return;

    spellingWords.push(word);
    saveWords();
    displayWordList();

    input.value='';
    input.focus();
}

function displayWordList(){
    const container=document.getElementById('wordList');
    if(!container) return;

    if(spellingWords.length===0){
        container.innerHTML='<p style="color:#ccc;">No words yet.</p>';
        return;
    }

    container.innerHTML = spellingWords.map(w=>`
        <div>${w}</div>
    `).join('');
}

function clearAllWords(){
    spellingWords=[];
    saveWords();
    displayWordList();
}

function loadSampleWords(){
    spellingWords=["EAGLE","SPELL","LEARN","SUCCESS"];
    saveWords();
    displayWordList();
}

/* ================= MODE NAVIGATION ================= */

function selectMode(mode){
    if(spellingWords.length===0){
        alert("Add words first!");
        return;
    }

    currentMode=mode;

    document.getElementById('menuScreen').classList.add('hidden');

    if(mode==='scramble')
        document.getElementById('scrambleScreen').classList.remove('hidden');

    if(mode==='hangman')
        document.getElementById('hangmanScreen').classList.remove('hidden');

    if(mode==='fillblank')
        document.getElementById('fillBlankScreen').classList.remove('hidden');
}

function exitGame(){
    document.querySelectorAll('.screen')
        .forEach(s=>s.classList.add('hidden'));

    document.getElementById('menuScreen')
        .classList.remove('hidden');
}

/* ================= SAFE INIT (FIX) ================= */

document.addEventListener('DOMContentLoaded', function(){

    loadWords();

    // SAFE focus — prevents iPad Safari crash
    const input = document.getElementById('wordInput');
    if(input){
        setTimeout(()=>input.focus(),100);
    }

});
</script>

</body>
</html>
