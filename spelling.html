<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spelling Challenge</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0b1f3a, #1f3b73);
  color: white;
  min-height: 100vh;
}
.screen { padding: 20px 16px 60px; }
.hidden { display: none; }

/* ── Menu ── */
#menuScreen { padding-top: 24px; }
#menuScreen h1 {
font-size: clamp(1.4rem, 6vw, 2rem);
text-align: center;
margin-bottom: 20px;
background: linear-gradient(135deg, #4df6ff, #c44dff);
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
background-clip: text;
}
.add-row {
display: flex; gap: 10px; margin-bottom: 14px;
justify-content: center;
}
#wordInput {
padding: 12px 14px;
font-size: clamp(14px, 3.5vw, 17px);
border-radius: 10px;
border: 2px solid #4df6ff;
background: rgba(255,255,255,0.08);
color: white;
width: min(260px, 65vw);
outline: none;
}
#wordInput::placeholder { color: rgba(255,255,255,0.3); }
#wordInput:focus { border-color: #c44dff; }
.addBtn {
padding: 12px 18px;
font-size: 1rem; font-weight: bold;
border: none; border-radius: 10px;
background: linear-gradient(135deg, #4df6ff, #4a9dff);
color: #0b1f3a;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
}
.playBtn {
display: block;
width: min(280px, 80vw);
margin: 16px auto;
padding: 16px;
font-size: 1.1rem; font-weight: bold;
border: none; border-radius: 14px;
background: linear-gradient(135deg, #c44dff, #ff6b9d);
color: white;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
}
.playBtn:disabled { opacity: 0.4; cursor: default; }

.chips {
display: flex; flex-wrap: wrap; gap: 8px;
justify-content: center;
margin: 10px auto;
max-width: 520px;
padding: 0 8px;
}
.chip {
background: rgba(77,246,255,0.12);
border: 1px solid rgba(77,246,255,0.4);
border-radius: 20px;
padding: 6px 12px;
font-size: 14px;
display: flex; align-items: center; gap: 8px;
}
.chip-x {
cursor: pointer;
opacity: 0.6;
font-weight: bold;
padding: 0 2px;
-webkit-tap-highlight-color: transparent;
}
.chip-x:hover { opacity: 1; }

.hint {
text-align: center;
color: rgba(255,255,255,0.35);
font-size: 0.85rem;
margin: 8px 0;
}

/* ── Game ── */
#gameScreen { text-align: center; }
#backBtn {
background: rgba(255,255,255,0.1);
border: 1px solid rgba(255,255,255,0.2);
color: white; border-radius: 20px;
padding: 8px 16px; font-size: 0.9rem;
cursor: pointer; margin-bottom: 14px;
-webkit-tap-highlight-color: transparent;
}
.lives { font-size: 1rem; margin-bottom: 8px; color: #ffce47; }

canvas {
display: block;
margin: 0 auto 10px;
border-radius: 10px;
background: white;
max-width: min(240px, 70vw);
height: auto;
}
.word-display {
font-size: clamp(20px, 6vw, 36px);
letter-spacing: 6px;
margin: 10px 0;
font-family: monospace;
min-height: 44px;
word-break: break-all;
padding: 0 10px;
}
.keyboard {
display: flex;
flex-wrap: wrap;
justify-content: center;
max-width: min(500px, 96vw);
margin: 8px auto;
gap: 4px;
}
.key {
padding: 9px;
width: clamp(30px, 7.5vw, 42px);
font-size: clamp(12px, 3vw, 15px);
font-weight: bold;
border-radius: 7px;
border: none;
background: rgba(255,255,255,0.12);
color: white;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
}
.key:disabled { opacity: 0.3; }
.key.hit  { background: #3fb950; color: white; }
.key.miss { background: #f85149; color: white; }

.feedback {
font-size: 1.1rem;
min-height: 1.8em;
margin: 8px 0;
color: #ffce47;
padding: 0 16px;
}
.nextBtn {
padding: 12px 28px;
font-size: 1rem; font-weight: bold;
border: none; border-radius: 20px;
background: linear-gradient(135deg, #3fb950, #27ae60);
color: white; cursor: pointer; margin: 4px;
-webkit-tap-highlight-color: transparent;
}
.menuBtn {
padding: 10px 22px;
font-size: 0.95rem;
border: 1px solid rgba(255,255,255,0.2);
border-radius: 20px;
background: rgba(255,255,255,0.08);
color: white; cursor: pointer; margin: 4px;
-webkit-tap-highlight-color: transparent;
}
</style>

</head>
<body>

<!-- ── MENU ── -->

<div id="menuScreen" class="screen">
  <h1>🔤 Spelling Challenge</h1>

  <div class="hint">Type a word and tap Add (apostrophes and hyphens are supported)</div>

  <div class="add-row">
    <input id="wordInput" type="text" placeholder="e.g. DON'T or IT'S" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="addBtn" onclick="addWord()">Add</button>
  </div>

  <div id="wordList" class="chips"></div>

  <div class="hint" id="countHint">No words yet — add some above</div>

<button class="playBtn" id="playBtn" onclick="startGame()" disabled>▶ Start Game</button>

</div>

<!-- ── GAME ── -->

<div id="gameScreen" class="screen hidden">
  <button id="backBtn" onclick="goMenu()">← Back to Words</button>
  <div class="lives" id="livesDisplay"></div>
  <canvas id="hangmanCanvas" width="220" height="210"></canvas>
  <div class="word-display" id="wordDisplay"></div>
  <div class="keyboard" id="keyboard"></div>
  <div class="feedback" id="feedback"></div>
  <button class="nextBtn hidden" id="nextBtn" onclick="nextRound()">Next Word →</button>
  <button class="menuBtn" onclick="goMenu()">Word List</button>
</div>

<script>
var words = [], cur = '', guessed = [], wrong = 0, over = false;
var MAX_WRONG = 6;
var STORE_KEY = 'eagleSpellingWords';

// ── SPECIAL CHARACTER HANDLING ────────────────────────────────────────────────
// These characters are auto-revealed — the player only guesses letters
function isAutoReveal(ch) {
  return ch === "'" || ch === '\u2019' || ch === '-' || ch === ' ' || ch === '.';
}

// ── STORAGE ───────────────────────────────────────────────────────────────────
function loadWords() {
  try {
    var s = localStorage.getItem(STORE_KEY);
    if (s) { words = JSON.parse(s); renderChips(); updatePlayBtn(); }
  } catch(e) {}
}
function saveWords() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(words)); } catch(e) {}
}

// ── MENU ──────────────────────────────────────────────────────────────────────
function addWord() {
  var inp = document.getElementById('wordInput');
  var w = inp.value.trim().toUpperCase();
  if (!w) return;
  // Validate: must have at least one letter
  if (!/[A-Z]/.test(w)) { inp.value = ''; return; }
  if (!words.includes(w)) {
    words.push(w);
    saveWords();
    renderChips();
    updatePlayBtn();
  }
  inp.value = '';
  inp.focus();
}

function removeWord(i) {
  words.splice(i, 1);
  saveWords();
  renderChips();
  updatePlayBtn();
}

function renderChips() {
  var el = document.getElementById('wordList');
  el.innerHTML = '';
  words.forEach(function(w, i) {
    var d = document.createElement('div');
    d.className = 'chip';
    var span = document.createElement('span');
    span.textContent = w;
    var x = document.createElement('span');
    x.className = 'chip-x';
    x.textContent = '×';
    x.onclick = function() { removeWord(i); };
    d.appendChild(span);
    d.appendChild(x);
    el.appendChild(d);
  });
}

function updatePlayBtn() {
  var btn = document.getElementById('playBtn');
  var hint = document.getElementById('countHint');
  btn.disabled = words.length === 0;
  hint.textContent = words.length === 0
    ? 'No words yet — add some above'
    : words.length + ' word' + (words.length > 1 ? 's' : '') + ' ready to play';
}

// ── GAME ──────────────────────────────────────────────────────────────────────
function startGame() {
  if (!words.length) return;
  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  nextRound();
}

function goMenu() {
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('menuScreen').classList.remove('hidden');
  try { window.speechSynthesis.cancel(); } catch(e) {}
}

function nextRound() {
  cur = words[Math.floor(Math.random() * words.length)];
  guessed = [];
  wrong = 0;
  over = false;
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('feedback').textContent = '';
  updateDisplay();
  updateLives();
  drawHangman();
  buildKeyboard();
  // Speak the word after a short delay
  setTimeout(function() { speak(cur); }, 600);
}

function updateDisplay() {
  var el = document.getElementById('wordDisplay');
  el.textContent = cur.split('').map(function(ch) {
    if (isAutoReveal(ch)) return ch;
    return guessed.includes(ch) ? ch : '_';
  }).join(' ');
}

function updateLives() {
  var remaining = MAX_WRONG - wrong;
  var s = 'Lives: ';
  for (var i = 0; i < remaining; i++) s += '❤️ ';
  for (var i = 0; i < wrong; i++) s += '🖤 ';
  document.getElementById('livesDisplay').textContent = s;
}

function buildKeyboard() {
  var kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(function(l) {
    var b = document.createElement('button');
    b.className = 'key';
    b.textContent = l;
    b.id = 'key-' + l;
    b.onclick = function() { guess(l, b); };
    kb.appendChild(b);
  });
}

function guess(letter, btn) {
  if (guessed.includes(letter) || over) return;
  guessed.push(letter);
  btn.disabled = true;

  if (cur.includes(letter)) {
    btn.classList.add('hit');
    updateDisplay();
    // Win check: all non-auto characters guessed
    var letters = cur.split('').filter(function(c) { return !isAutoReveal(c); });
    var allGuessed = letters.every(function(c) { return guessed.includes(c); });
    if (allGuessed) {
      document.getElementById('feedback').textContent = '🎉 You got it!';
      over = true;
      document.getElementById('nextBtn').classList.remove('hidden');
      speak('Correct! The word was ' + cur.replace(/'/g, ''));
    }
  } else {
    btn.classList.add('miss');
    wrong++;
    updateLives();
    drawHangman();
    if (wrong >= MAX_WRONG) {
      document.getElementById('feedback').textContent = 'The word was: ' + cur;
      over = true;
      document.getElementById('nextBtn').classList.remove('hidden');
      // Reveal full word
      document.getElementById('wordDisplay').textContent = cur.split('').join(' ');
    }
  }
}

// ── HANGMAN DRAWING ───────────────────────────────────────────────────────────
function drawHangman() {
  var c = document.getElementById('hangmanCanvas');
  var ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);

  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';

  // Base
  ctx.beginPath(); ctx.moveTo(20,200); ctx.lineTo(140,200); ctx.stroke();
  // Pole
  ctx.beginPath(); ctx.moveTo(40,200); ctx.lineTo(40,15); ctx.stroke();
  // Top bar
  ctx.beginPath(); ctx.moveTo(40,15); ctx.lineTo(130,15); ctx.stroke();
  // Rope
  ctx.beginPath(); ctx.moveTo(130,15); ctx.lineTo(130,45); ctx.stroke();

  if (wrong >= 1) { // Head
    ctx.beginPath(); ctx.arc(130,65,20,0,Math.PI*2); ctx.stroke();
  }
  if (wrong >= 2) { // Body
    ctx.beginPath(); ctx.moveTo(130,85); ctx.lineTo(130,145); ctx.stroke();
  }
  if (wrong >= 3) { // Left arm
    ctx.beginPath(); ctx.moveTo(130,100); ctx.lineTo(105,125); ctx.stroke();
  }
  if (wrong >= 4) { // Right arm
    ctx.beginPath(); ctx.moveTo(130,100); ctx.lineTo(155,125); ctx.stroke();
  }
  if (wrong >= 5) { // Left leg
    ctx.beginPath(); ctx.moveTo(130,145); ctx.lineTo(108,178); ctx.stroke();
  }
  if (wrong >= 6) { // Right leg
    ctx.beginPath(); ctx.moveTo(130,145); ctx.lineTo(152,178); ctx.stroke();
  }
}

// ── SPEECH ────────────────────────────────────────────────────────────────────
function speak(text) {
  try {
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.rate = 0.8;
    u.lang = 'en-US';
    window.speechSynthesis.speak(u);
  } catch(e) {}
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
document.getElementById('wordInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addWord();
});
loadWords();
</script>

</body>
</html>
