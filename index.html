<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EagleLearn</title>
<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
text-align:center;
}

header{
padding:20px;
font-size:40px;
}

button{
padding:16px 22px;
font-size:18px;
border:none;
border-radius:10px;
background:#ffd447;
cursor:pointer;
}

button:active{
transform:scale(.96);
}

.container{
padding-top:40px;
}
</style>
</head>

<body>

<header>🦅 EagleLearn</header>

<div class="container">
<button onclick="launchGame()">Play Hoop Math 🏀</button>
</div>

<script>
function launchGame(){
window.location.href="hoop-math.html"
}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
}
</script>

</body>
</html>
