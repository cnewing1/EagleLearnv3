<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EagleLearn">

<title>EagleLearn</title>

<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<style>
/* ============================================================
   (ALL YOUR EXISTING CSS REMAINS EXACTLY THE SAME)
   No styling changes required for rebrand.
   ============================================================ */
</style>
</head>

<body class="theme-fun">

<canvas id="ambient-canvas"></canvas>

<!-- TOP BAR -->
<nav class="topbar" id="topbar">
  <span class="topbar-logo">🦅 EagleLearn</span>
</nav>

<div id="toast">✅ Done!</div>

<script>
/* ============================================================
   STORAGE HELPER
   (Keeping lb_ prefix so users keep their progress)
   ============================================================ */
const DB = {
  get:(k,f=null)=>{
    try{
      const v=localStorage.getItem('lb_'+k);
      return v?JSON.parse(v):f;
    }catch{return f;}
  },
  set:(k,v)=>{
    try{localStorage.setItem('lb_'+k,JSON.stringify(v));}catch{}
  }
};

/* ============================================================
   INITIAL DATA (EagleLearn Defaults)
   ============================================================ */
function initData(){

  // USERS
  if(!DB.get('users')){
    DB.set('users',{
      corbin:{
        name:'Corbin',
        emoji:'🚀',
        stars:0,
        completedGames:[],
        gameProgress:{}
      },
      charlotte:{
        name:'Charlotte',
        emoji:'🌟',
        stars:0,
        completedGames:[],
        gameProgress:{}
      }
    });
  }

  // DEFAULT LIBRARY
  if(!DB.get('library')){
    DB.set('library',[

      {
        id:'math-multiplication',
        name:'Multiplication Master',
        subject:'math',
        emoji:'🔢',
        desc:'Times tables 1–10 with mini-game rewards',
        file:'math-multiplication.html',
        status:'published',
        assignedTo:['corbin','charlotte'],
        addedDate:new Date().toISOString()
      },

      {
        id:'spelling-game',
        name:'Spelling Challenge',
        subject:'spelling',
        emoji:'🔤',
        desc:'Practice spelling with audio and hangman',
        file:'spelling-game.html',
        status:'published',
        assignedTo:['corbin','charlotte'],
        addedDate:new Date().toISOString()
      }

    ]);
  }

  // ADMIN PASSWORD
  if(!DB.get('adminPass')){
    DB.set('adminPass','learn2025');
  }
}

/* ============================================================
   CLEAR CACHE
   ============================================================ */
async function clearAppCache(){

  if(!confirm("This will clear ALL EagleLearn data and cache. Continue?")) return;

  localStorage.clear();

  if('caches' in window){
    const keys=await caches.keys();
    await Promise.all(keys.map(k=>caches.delete(k)));
  }

  if('serviceWorker' in navigator){
    const regs=await navigator.serviceWorker.getRegistrations();
    for(const r of regs) await r.unregister();
  }

  alert("EagleLearn reset complete. Reloading...");
  window.location.reload();
}

/* ============================================================
   BOOT
   ============================================================ */
function boot(){
  initData();

  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
}

boot();
</script>

</body>
</html>
