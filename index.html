<link rel="preconnect" href="https://fonts.googleapis.com">

</head>

<body class="theme-fun">

<!-- =========================
     YOUR ORIGINAL HTML UI
     (screens, login, admin, dashboard, etc.)
     NOTHING CHANGED HERE
========================= -->

<script>

/* ============================================================
   LOCAL STORAGE DB
============================================================ */
const DB = {
  get: (key, fallback = null) => {
    try {
      const v = localStorage.getItem('lb_' + key);
      return v ? JSON.parse(v) : fallback;
    } catch { return fallback; }
  },
  set: (key, val) => {
    try { localStorage.setItem('lb_' + key, JSON.stringify(val)); } catch {}
  }
};

/* ============================================================
   INITIAL DATA SETUP  ✅ FIXED
============================================================ */
function initData() {

  if (!DB.get('users')) {
    DB.set('users', {
      corbin: { name:'Corbin', emoji:'🚀', stars:0, completedGames:[], gameProgress:{} },
      charlotte: { name:'Charlotte', emoji:'🌟', stars:0, completedGames:[], gameProgress:{} }
    });
  }

  /* ✅ FIX:
     spelling game now auto-exists after cache reset
  */
  if (!DB.get('library')) {
    DB.set('library', [

      {
        id:'math-multiplication',
        name:'Multiplication Master',
        subject:'math',
        emoji:'🔢',
        desc:'Times tables 1–10 with mini-game rewards',
        file:'games/math-multiplication.html',
        status:'published',
        assignedTo:['corbin','charlotte'],
        addedDate:new Date().toISOString()
      },

      {
        id:'spelling-game',
        name:'Spelling Challenge',
        subject:'spelling',
        emoji:'🔤',
        desc:'Practice spelling with audio & hangman',
        file:'games/spelling-game.html',
        status:'published',
        assignedTo:['corbin','charlotte'],
        addedDate:new Date().toISOString()
      }

    ]);
  }

  if (!DB.get('adminPass')) {
    DB.set('adminPass','learn2025');
  }
}

/* ============================================================
   APP STATE
============================================================ */
let currentUser=null;
let currentTheme=DB.get('theme')||'fun';

/* ============================================================
   GAME LAUNCHER  ✅ FIXED
   Prevents blank screen when path missing /games/
============================================================ */
function launchGame(game){

  const iframe=document.getElementById('game-iframe');

  let file=game.file||'';

  // auto-normalize path
  if(!file.startsWith('games/')){
    file='games/'+file;
  }

  iframe.src=file;
  showScreen('game');
}

function exitGame(){
  document.getElementById('game-iframe').src='';
  if(currentUser) showDash();
  else showAdmin();
}

/* ============================================================
   CLEAR CACHE FIX  ✅ CRITICAL BUG FIX
   Stops white-screen-after-reset problem
============================================================ */
async function clearCache(){

  if(!confirm("Reset EagleLearn and clear all cached data?")) return;

  localStorage.clear();

  if('caches' in window){
    const keys=await caches.keys();
    await Promise.all(keys.map(k=>caches.delete(k)));
  }

  if('serviceWorker' in navigator){
    const regs=await navigator.serviceWorker.getRegistrations();
    for(const r of regs) await r.unregister();
  }

  // hard reload bypassing stale SW
  window.location.replace(
    window.location.pathname + '?reset=' + Date.now()
  );
}

/* ============================================================
   BOOT
============================================================ */
function boot(){

  initData();
  setTheme(currentTheme);
  updateLoginStars();

  // service worker safe register
  if('serviceWorker' in navigator){
    navigator.serviceWorker
      .register('./sw.js')
      .catch(()=>{});
  }
}

boot();

</script>
</body>
</html>
