<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="EagleLearn">

<title>EagleLearn</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f0822;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.screen{
  display:none;
  text-align:center;
}

.screen.active{
  display:block;
}

button{
  padding:14px 24px;
  font-size:18px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  background:linear-gradient(135deg,#ff6b9d,#c44dff);
  color:white;
}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="screen-login" class="screen active">
  <h1>🦅 EagleLearn</h1>
  <p>Select learner</p>

  <button onclick="selectUser('corbin')">🚀 Corbin</button>
  <br><br>
  <button onclick="selectUser('charlotte')">🌟 Charlotte</button>

  <br><br><br>
  <button onclick="clearAppCache()">🧹 Clear App Cache</button>
</div>

<!-- DASHBOARD -->
<div id="screen-dashboard" class="screen">
  <h1 id="welcome"></h1>

  <button onclick="launchGame('math-multiplication.html')">
    🔢 Multiplication Master
  </button>

  <br><br>

  <button onclick="launchGame('spelling-game.html')">
    🔤 Spelling Challenge
  </button>

  <br><br><br>
  <button onclick="showLogin()">← Exit</button>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <button onclick="exitGame()">← Back</button>
  <iframe id="gameFrame" style="width:100vw;height:85vh;border:none;"></iframe>
</div>

<script>
/* ======================================================
   STORAGE
====================================================== */
const DB={
  get:(k,f=null)=>{
    try{
      const v=localStorage.getItem('lb_'+k);
      return v?JSON.parse(v):f;
    }catch{return f;}
  },
  set:(k,v)=>{
    localStorage.setItem('lb_'+k,JSON.stringify(v));
  }
};

/* ======================================================
   INIT DATA (FIXED)
====================================================== */
function initData(){

  if(!DB.get('users')){
    DB.set('users',{
      corbin:{name:'Corbin'},
      charlotte:{name:'Charlotte'}
    });
  }

  if(!DB.get('library')){
    DB.set('library',[
      {name:'Multiplication Master',file:'math-multiplication.html'},
      {name:'Spelling Challenge',file:'spelling-game.html'}
    ]);
  }
}

/* ======================================================
   SCREEN NAV
====================================================== */
function showScreen(id){
  document.querySelectorAll('.screen')
    .forEach(s=>s.classList.remove('active'));

  document.getElementById(id).classList.add('active');
}

function showLogin(){
  showScreen('screen-login');
}

/* ======================================================
   USER
====================================================== */
let currentUser=null;

function selectUser(uid){
  currentUser=uid;
  const users=DB.get('users');
  document.getElementById('welcome').innerText =
    "Welcome " + users[uid].name + "!";
  showScreen('screen-dashboard');
}

/* ======================================================
   GAME
====================================================== */
function launchGame(file){
  document.getElementById('gameFrame').src=file;
  showScreen('screen-game');
}

function exitGame(){
  document.getElementById('gameFrame').src='';
  showScreen('screen-dashboard');
}

/* ======================================================
   ✅ FIXED CLEAR CACHE
====================================================== */
async function clearAppCache(){

  if(!confirm("Reset EagleLearn completely?")) return;

  localStorage.clear();

  if('caches' in window){
    const keys=await caches.keys();
    await Promise.all(keys.map(k=>caches.delete(k)));
  }

  if('serviceWorker' in navigator){
    const regs=await navigator.serviceWorker.getRegistrations();
    for(const r of regs){
      await r.unregister();
    }
  }

  // CRITICAL FIX:
  // force hard reload bypassing service worker
  location.href = location.pathname + "?reset=" + Date.now();
}

/* ======================================================
   BOOT
====================================================== */
initData();
</script>

</body>
</html>
